name: ci

# Qualitäts-Gate: läuft bei jedem Push auf main und bei jedem Pull Request.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true # Binaerassets (icon.*, resource_windows_amd64.syso) liegen in LFS

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false # Projekt hat keine Dependencies (kein go.sum)

      - name: gofmt prüfen
        run: |
          # vendor/ ist Fremdcode und wird nicht geprüft.
          unformatted="$(gofmt -l cmd internal)"
          if [ -n "$unformatted" ]; then
            echo "Folgende Dateien sind nicht gofmt-konform:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Build (Linux + Windows)
        run: |
          set -e
          go build ./...
          # Cross-Compile nach Windows ohne CGO: der Runner-gcc ist Linux und
          # kennt das Windows-Flag -mconsole nicht, das Projekt hat aber keinen
          # CGO-Code (nur vendored Go-Pakete), also ist CGO_ENABLED=0 sicher.
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -o /dev/null ./cmd/launcher
          GOOS=linux   GOARCH=amd64 go build -o /dev/null ./cmd/launcher
