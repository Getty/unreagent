name: ci

# Qualitäts-Gate: läuft bei jedem Push auf main und bei jedem Pull Request.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false # Projekt hat keine Dependencies (kein go.sum)

      - name: gofmt prüfen
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "Folgende Dateien sind nicht gofmt-konform:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Build (Linux + Windows)
        run: |
          set -e
          go build ./...
          GOOS=windows GOARCH=amd64 go build -o /dev/null ./cmd/launcher
          GOOS=linux   GOARCH=amd64 go build -o /dev/null ./cmd/launcher
