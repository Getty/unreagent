# ============================================================
#  unreagent — committbare Projekt-Konfiguration
#
#  Benenne diese Datei zu  unreagent.yaml  und lege sie neben die
#  .uproject (und neben unreagent.exe). Sie ist portabel und gehört
#  ins Projekt-Repo.
#
#  KEINE Maschinenpfade hier! Sie werden automatisch aufgelöst und
#  über Platzhalter eingesetzt:
#    ${ENGINE}        UE-Installationswurzel (Env UE_ROOT / Auto-Detect)
#    ${PROJECT}       voller Pfad zur .uproject (Auto-Detect daneben)
#    ${PROJECT_DIR}   Verzeichnis der .uproject
#    ${PROJECT_NAME}  Name der .uproject ohne Endung
#
#  Maschinen-Overrides (Engine-Pfad, claude-Pfad …) gehören in eine
#  git-ignorierte  unreagent.local.yaml  — Beispiel ganz unten.
# ============================================================

agent:
  enabled: true
  command: claude
  # Hängt --mcp-config (+ --permission-prompt-tool) automatisch an:
  claudeIntegration: true
  # args: ["-p", "Starte und arbeite die Aufgaben ab"]   # optional

permissions:
  enabled: true
  mode: allow_all            # allow_all | allowlist | deny_all
  deny:
    - "Bash(rm -rf *)"
  # Bei mode: allowlist greift stattdessen diese Liste:
  # allow: ["Read", "Edit", "Write", "Bash(git *)", "mcp__unreagent__*"]

runtimes:
  python:
    enabled: true
    prepareOnStart: true     # uv sync beim Start, falls pyproject.toml vorhanden
  node:
    enabled: true

# Datei-Tools (read_file/list_dir/write_file/edit_file) über den MCP-Server.
# Praktisch zusammen mit `-no-agent`: UE + MCP laufen, ein externer Agent
# verbindet sich und arbeitet am Projekt, ohne dass jemand lokal anwesend ist.
# Schnell per Flag: unreagent.exe -files   (bzw. -no-agent für nur UE+MCP)
files:
  enabled: false
  root: "${PROJECT_DIR}"     # alle Pfade strikt darauf beschränkt
  readOnly: false            # true = nur lesen

mcp:
  enabled: true
  address: 127.0.0.1:8765
  # Zusätzliche In-Editor-MCP-Server, über die der Agent IN der Engine arbeitet
  # (z.B. UE LLM Toolkit: Node-Bridge -> HTTP-Server im Editor auf Port 3000).
  # Werden zusammen mit dem unreagent-Server in --mcp-config gegeben.
  # strict: false   # true = NUR diese Server (projekt-eigene .mcp.json ignorieren)
  # extraServers:
  #   ue-llm-toolkit:
  #     command: node
  #     args: ["${PROJECT_DIR}/Plugins/UELLMToolkit/Resources/mcp-bridge/index.js"]
  #     env:
  #       UNREAL_MCP_URL: "http://127.0.0.1:3000"
  # MCP-Config zusaetzlich als Datei(en) schreiben (fuer externe Clients wie
  # die eigene Claude-Sitzung, Cursor, VS Code). Auch per Flag: -write-mcp-config
  # writeConfig:
  #   - { path: ".mcp.json", format: mcp_json }       # Claude Code / Cursor / Claude Desktop
  #   - { path: ".vscode/mcp.json", format: vscode }  # VS Code

# ------------------------------------------------------------
# unreal: und commands: sind OPTIONAL. Editor-Pfad sowie die
# Befehle "compile" und "package" werden automatisch aus
# ${ENGINE} + ${PROJECT} abgeleitet. Nur überschreiben, wenn nötig:
#
# unreal:
#   args: ["-stdout", "-FullStdOutLogOutput", "-nosplash"]
#   restart: on-failure
#   maxRestarts: 5
#   unattended: true          # -unattended: kein Crash-Dialog + kein Recovery-Prompt (default an)
#   killCrashReporter: true   # haengendes CrashReportClientEditor.exe killen (default an)
#   cleanOnRestart: false     # Saved/Autosaves/PackageRestoreData.json + Saved/Crashes vor Start raeumen
#
# commands:
#   cook:
#     description: "Nur Content cooken"
#     command: "${ENGINE}/Engine/Build/BatchFiles/RunUAT.bat"
#     args: ["BuildCookRun", "-project=${PROJECT}", "-noP4", "-cook", "-skipstage"]
# ------------------------------------------------------------

# ============================================================
#  Beispiel  unreagent.local.yaml  (NICHT committen — git-ignored):
#
#    engineRoot: "D:/UE/UE_5.7"        # falls Auto-Detect scheitert
#    agent:
#      command: "C:/Users/me/AppData/Roaming/npm/claude.cmd"  # claude nicht im PATH
# ============================================================
